<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Info</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <main>
    <header>
      <h1>Contact Info</h1>
      <p>Enter your details below. All fields are required.</p>
    </header>

    <section class="card" id="form-section">
      <div class="field">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="user@example.com" autocomplete="email" />
        <span class="error"></span>
      </div>

      <div class="field">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" placeholder="555-867-5309" autocomplete="tel" />
        <span class="error"></span>
      </div>

      <div class="field">
        <label for="zip">ZIP Code</label>
        <input type="text" id="zip" placeholder="90210" maxlength="10" />
        <span class="error"></span>
      </div>

      <div class="field">
        <label for="dob">Date of Birth</label>
        <input type="date" id="dob" />
        <span class="error"></span>
      </div>

      <div class="actions">
        <button id="save-btn" class="btn-primary">Save</button>
        <button id="clear-btn" class="btn-secondary">Clear</button>
      </div>
    </section>

    <section class="card" id="display">
      <p class="empty">No contact saved yet.</p>
    </section>
  </main>

  <!-- type="module" enables ES module imports -->
  <script type="module" src="index.js"></script>
</body>
</html>
